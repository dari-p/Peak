<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Peak - Entreno</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-required workout-page">

    <main class="mobile-shell workout-shell">

        <header class="workout-topbar">
            <a href="routines.html" class="back-link" aria-label="Volver a rutinas">&lt;</a>

            <div>
                <span class="eyebrow">Rutina activa</span>
                <h1 id="workout-title">Entreno</h1>
            </div>

            <button type="button" class="finish-button" id="finish-workout-top">Terminar</button>
        </header>

        <section class="workout-stats" aria-label="Resumen del entrenamiento">
            <div class="stat-tile">
                <span>Duraci&oacute;n</span>
                <strong id="workout-duration">00:00</strong>
            </div>

            <div class="stat-tile">
                <span>Volumen</span>
                <strong id="workout-volume">0 kg</strong>
            </div>

            <div class="stat-tile">
                <span>Series</span>
                <strong id="workout-sets">0</strong>
            </div>
        </section>

        <section class="workout-progress">
            <div>
                <span class="section-kicker">Progreso</span>
                <h2 id="workout-progress-copy">0 de 0 ejercicios</h2>
            </div>
            <div class="progress-ring" id="workout-progress-ring" aria-label="0 por ciento completado">0%</div>
        </section>

        <section class="exercise-stack" id="exercise-stack" aria-label="Ejercicios del entrenamiento">
            <article class="exercise-block">
                <p class="next-copy">Cargando entrenamiento.</p>
            </article>
        </section>

    </main>

    <div class="workout-action-bar">
        <button type="button" class="secondary-workout-button" id="add-exercise-button">+ Ejercicio</button>
        <button type="button" class="finish-wide-button" id="finish-workout-bottom">Terminar entreno</button>
    </div>

    <script src="auth.js"></script>
    <script src="peak.js"></script>
</body>
</html>
