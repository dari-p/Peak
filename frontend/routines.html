<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Peak - Rutinas</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-required routines-page">

    <main class="mobile-shell">

        <header class="routines-header">
            <div>
                <span class="eyebrow">Peak Training</span>
                <h1>Entrenamiento</h1>
            </div>

            <div class="profile-pill" title="Usuario activo">
                <span data-user-name>Perfil</span>
            </div>
        </header>

        <section class="hero-action">
            <a href="workout.html?empty=1" class="start-empty-button" id="start-empty-workout">
                <span class="button-icon">+</span>
                Empezar entrenamiento vac&iacute;o
            </a>
        </section>

        <section class="routine-actions" aria-label="Acciones de rutinas">
            <button type="button" class="action-tile" id="create-routine-button">
                <span class="tile-icon">+</span>
                Nueva rutina
            </button>

            <button type="button" class="action-tile" id="add-template-button">
                <span class="tile-icon">?</span>
                Explorar
            </button>
        </section>

        <section class="routine-summary">
            <div>
                <span class="section-kicker">Mis rutinas</span>
                <h2 id="routine-count">Rutinas</h2>
            </div>
            <button type="button" class="ghost-icon-button" id="reset-routines-button" aria-label="Restaurar rutinas">R</button>
        </section>

        <section class="routine-list" id="routine-list" aria-label="Lista de rutinas">
        </section>

    </main>

    <nav class="bottom-nav" aria-label="Navegaci&oacute;n principal">
        <a href="dashboard.html">
            <span class="nav-mark">H</span>
            Inicio
        </a>
        <a href="routines.html" class="active">
            <span class="nav-mark">R</span>
            Rutinas
        </a>
        <a href="#">
            <span class="nav-mark">P</span>
            Perfil
        </a>
    </nav>

    <script src="auth.js"></script>
    <script src="peak.js"></script>
</body>
</html>
